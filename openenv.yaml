spec_version: 1
name: adaptive_driving_env
type: space
sdk: docker
app: server.app:app
port: 7860

tasks:
  - id: easy
    name: Easy Drive
    grader:
      type: llm
      prompt: |
        position = {{position}}
        goal = {{goal}}

        if goal <= 0:
          return 0.02

        if position >= goal:
          return 0.95

        return 0.05 + 0.9 * (position / goal)

        Output ONLY a number between 0.02 and 0.98.
    score_range: [0.01, 0.99]

  - id: medium
    name: Medium Drive
    grader:
      type: llm
      prompt: |
        position = {{position}}
        goal = {{goal}}
        speed = {{speed}}
        visibility = {{visibility}}

        if goal <= 0:
          return 0.02

        penalty = 0
        if visibility < 0.6:
          penalty += 0.2
        if speed > 10:
          penalty += 0.2

        progress = position / goal
        score = progress - penalty

        if position >= goal:
          score = 0.9 - penalty

        return max(0.02, min(score, 0.98))

        Output ONLY a number.
    score_range: [0.01, 0.99]

  - id: hard
    name: Hard Drive
    grader:
      type: llm
      prompt: |
        position = {{position}}
        goal = {{goal}}
        battery = {{battery}}

        if goal <= 0:
          return 0.02

        progress = position / goal
        battery_factor = battery / 100

        score = 0.7 * progress + 0.3 * battery_factor

        if position >= goal and battery > 0:
          score = 0.9

        return max(0.02, min(score, 0.98))

        Output ONLY a number.
    score_range: [0.01, 0.99]