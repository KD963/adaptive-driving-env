spec_version: 1
name: adaptive_driving_env
type: space
sdk: docker
app: server.app:app
port: 7860

tasks:
  - id: easy
    name: Easy Drive
    grader:
      type: llm
      prompt: |
        You are a strict grading function.

        Inputs:
        position = {{position}}
        goal = {{goal}}

        Compute:
        If position >= goal:
          score = 0.95
        Else:
          score = 0.05 + 0.9 * (position / goal)

        CRITICAL RULES:
        - Output ONLY a number
        - Do NOT include any text
        - Do NOT include explanations
        - Do NOT include words
        - Output must be between 0.02 and 0.98

        Output format:
        0.23

    score_range: [0.01, 0.99]

  - id: medium
    name: Medium Drive
    grader:
      type: llm
      prompt: |
        You are a strict grading function.

        Inputs:
        position = {{position}}
        goal = {{goal}}
        speed = {{speed}}
        visibility = {{visibility}}

        Compute:
        progress = position / goal

        penalty = 0
        If visibility < 0.6:
          penalty += 0.2
        If speed > 10:
          penalty += 0.2

        raw = progress - penalty
        score = 0.05 + 0.9 * max(0.01, raw)

        If position >= goal:
          score = 0.9 - penalty

        CRITICAL RULES:
        - Output ONLY a number
        - No text, no explanation
        - Output must be between 0.02 and 0.98

        Output format:
        0.23

    score_range: [0.01, 0.99]

  - id: hard
    name: Hard Drive
    grader:
      type: llm
      prompt: |
        You are a strict grading function.

        Inputs:
        position = {{position}}
        goal = {{goal}}
        battery = {{battery}}

        Compute:
        progress = position / goal
        battery_factor = battery / 100

        combined = 0.7 * progress + 0.3 * battery_factor
        score = 0.05 + 0.9 * combined

        If position >= goal AND battery > 0:
          score = 0.9 + 0.05 * battery_factor

        CRITICAL RULES:
        - Output ONLY a number
        - No text, no explanation
        - Output must be between 0.02 and 0.98

        Output format:
        0.23

    score_range: [0.01, 0.99]